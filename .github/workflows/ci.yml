name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Makefile command
        run: make hello

  security:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run basic security scan
        run: |
          echo "Running basic security checks"
          docker --version

  docker:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image with tag
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t devops-training:$IMAGE_TAG .

      - name: Run container
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker run devops-training:$IMAGE_TAG

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag devops-training:$IMAGE_TAG ghcr.io/$REPO:$IMAGE_TAG

      - name: Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/$REPO:$IMAGE_TAG
