name: CI Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Makefile command
        run: make hello

  security:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run basic security scan
        run: |
          echo "Running basic security checks"
          docker --version

  docker:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::875703966134:role/github-actions-ecr-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image with tag
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t devops-training:$IMAGE_TAG .

      - name: Run container
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker run --rm devops-training:$IMAGE_TAG

      - name: Tag image for ECR
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker tag devops-training:$IMAGE_TAG 875703966134.dkr.ecr.us-east-1.amazonaws.com/devops-training:$IMAGE_TAG

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker push 875703966134.dkr.ecr.us-east-1.amazonaws.com/devops-training:$IMAGE_TAG
